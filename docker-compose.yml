services:
  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - qdrant
      - redis

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: cto_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant

    ports:
      - "6333:6333"

  redis:
    image: redis:7-alpine

    ports:
      - "6379:6379"